
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Todo </title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(135deg, #6C2BD9, #A855F7);
    font-family: 'Poppins', sans-serif;
}
/* Header */
.header {
    text-align: center;
    color: white;
    margin-top: 40px;
}
.tagline {
    opacity: 0.85;
}
/* Date */
.date-text {
    font-size: 14px;
    background: rgba(255,255,255,0.2);
    display: inline-block;
    padding: 5px 12px;
    border-radius: 20px;
    margin-top: 5px;
}
/* Main Box */
.main-box {
    background: white;
    border-radius: 20px;
    padding: 25px;
    margin-top: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease;
}
/* Input */
.task-input-wrapper {
    max-width: 500px;
    margin: auto;
}
/* Sections */
.section-title {
    font-weight: 600;
    margin-bottom: 15px;
}
/* Task */
.task {
    background: #F9FAFB;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}
.task:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}
/* Buttons */
.btn-purple {
    background: #6C2BD9;
    color: white;
}
.btn-purple:hover {
    background: #4B1FA6;
}
.small-btn {
    font-size: 12px;
    padding: 4px 8px;
}
/* Divider */
.divider {
    border-left: 2px solid #eee;
}
/* Footer */
footer {
    text-align: center;
    color: white;
    margin-top: 25px;
    padding-bottom: 20px;
    font-size: 14px;
    opacity: 0.9;
}
.heart {
    color: #F472B6;
    font-weight: bold;
}
/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
/* Responsive */
@media (max-width: 768px) {
    .divider {
        display: none;
    }
}
</style>
</head>
<body>
<div class="container">
    <!-- 🔝 Header -->
    <div class="header">
        <h1>📝 To-Do</h1>
        <p class="tagline">Plan your day. Execute with focus.</p>
        <p class="date-text"> {% now "jS F Y" %}</p>
    </div>
    <!-- 🧾 Main Box -->
    <div class="main-box">
        <!-- Input -->
        
        <div class="task-input-wrapper mb-4">
            <form action= "{% url 'addTask' %}" method="POST">
                {% csrf_token %}
            <div class="input-group">

                <input type="text" name="task" class="form-control" placeholder="Add a new task here...">
                <button type="submit" class="btn btn-purple">Add</button>
            </div> </form>
        </div>
        <div class="row">
            <!-- ❌ Incomplete -->
            
            <div class="col-md-6 mb-4">
                <h5 class="section-title">Incomplete Tasks</h5>
                {% for task in tasks %} 
                <div class="task">
                    <span>{{ task.task }}</span>
                    <div>
                        <a href="{% url 'mark_as_done' task.pk%}"> <button class="btn btn-success small-btn">✔</button> </a>
                        
                        <a href="{% url 'delete_task' task.pk%}"><button class="btn btn-danger small-btn">✖</button></a>
                    </div>
                </div>
                {% endfor %}
            </div>  
            <!-- Divider -->
            <div class="col-md-1 d-none d-md-flex justify-content-center">
                <div class="divider"></div>
            </div>
            <!-- ✅ Completed -->
            
            <div class="col-md-5 mb-4">
                <h5 class="section-title">Completed Tasks</h5>
                {% for task in completed_tasks %} 
                <div class="task"> 
                    <span><del>{{ task.task }}</del></span>
                    <div>
                        <a href="{% url 'mark_as_undone' task.pk%}"><button class="btn btn-secondary small-btn">↩</button></a>
                        
                        <a href="{% url 'delete_task' task.pk %}"><button class="btn btn-danger small-btn">✖</button></a>
                    </div>
                </div>
                {% endfor %}
            </div>
            
        </div>
    </div>
    <!-- 🔻 Footer -->
    <footer>
        <p>Crafted with <span class="heart">❤</span> by Priyanshu Songara</p>
    </footer>
</div>
</body>
</html>
